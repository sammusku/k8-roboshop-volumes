# creating headless service to identify other nodes/ip in cluster
apiVersion: v1
kind: Service
metadata:
  name: mongodb-headless
  namespace: roboshop
  labels:
    project: roboshop
    tier: db
    component: mongodb
spec:
 clusterIP: None
 selector:   # labels are used as selectors
    project: roboshop
    tier: db
    component: mongodb
 ports:
  - protocol: TCP
    port: 27017 # servie port
    targetPort: 27017# container port
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: roboshop
  labels: 
   project: roboshop
   tier: db
   component: mongodb
spec:
  selector:
    matchLabels:
     project: roboshop
     tier: db
     component: mongodb
  serviceName: "mongodb-headless"  #we should attach headless server
  replicas: 3 # by default is 1
  # Pod definition
  template:
    metadata:
      labels:
       project: roboshop
       tier: db
       component: mongodb  # has to match .spec.selector.matchLabels
    spec:
      containers:
      - name: mongodb
        image: sam123yuktha/mongodb:1.0.0
        volumeMounts:
        - name: mongodbd
          mountPath: /data/db
  #PVC
  volumeClaimTemplates:
  - metadata:
      name: mongodb
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: "roboshop-ebs"
      resources:
        requests:
          storage: 1Gi
---
#Creating Service for POD to POD communication and loadbalancing

apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: roboshop
  labels:
    project: roboshop
    tier: db
    component: mongodb
spec:
  selector:
    # labels are used as selectors
    project: roboshop
    tier: db
    component: mongodb
  ports:
  - protocol: TCP
    port: 27017 # servie port
    targetPort: 27017 # container port